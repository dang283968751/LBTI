<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#fdf2f8">

<meta name="description" content="🔥 火爆全网的 SBTI 人格测试！30 道有趣题目，测出你的专属人格。27 种结局，你是拿捏者？尤物？还是隐藏酒鬼？快来测！">
<meta name="keywords" content="SBTI,人格测试,心理测试,性格测试,MBTI,趣味测试,小红书">
<meta property="og:title" content="SBTI 人格测试 · 测测你是什么人格">
<meta property="og:description" content="🔥 火爆全网的 SBTI 人格测试！30 道有趣题目，27 种结局等你来测。">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎭%3C/text%3E%3C/svg%3E">
<!-- Tailwind CDN: dynamic script, SRI not applicable -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
  (function () {
    var s = localStorage.getItem('sbti-theme');
    var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (s ? s === 'dark' : d) document.documentElement.classList.add('dark');
  })();
</script>

<style>
  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --c-pink: #f472b6;
    --c-rose: #fb7185;
    --c-bg: #fdf2f8;
    --c-card: #ffffff;
    --c-text: #4a2040;
    --c-sub: #9d7a8f;
  }
  .dark {
    --c-bg: #1a1025;
    --c-card: #241835;
    --c-text: #f0dce8;
    --c-sub: #b095a8;
  }
  body {
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    transition: background .3s, color .3s;
    overscroll-behavior: none;
  }
  .card {
    background: var(--c-card);
    border-radius: 20px;
    box-shadow: 0 2px 16px rgba(244,114,182,.08);
    transition: transform .15s, box-shadow .15s;
  }
  .card:active { transform: scale(.98); }
  .btn-primary {
    background: linear-gradient(135deg, #f472b6, #fb7185);
    color: #fff;
    border-radius: 16px;
    font-weight: 600;
    transition: opacity .15s, transform .15s;
    box-shadow: 0 4px 16px rgba(244,114,182,.3);
  }
  .btn-primary:active { transform: scale(.96); opacity: .85; }
  .btn-option {
    background: var(--c-card);
    border: 2px solid #fce7f3;
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 15px;
    text-align: left;
    transition: all .15s;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 56px;
  }
  .dark .btn-option { border-color: #3d2a48; }
  .btn-option:active { border-color: var(--c-pink); background: #fdf2f8; }
  .btn-option.selected { border-color: var(--c-pink); background: #fdf2f8; }
  .dark .btn-option.selected { background: #3d1a38; }
  .btn-option .emoji { font-size: 28px; flex-shrink: 0; }
  .progress-bar { height: 6px; border-radius: 3px; background: #fce7f3; overflow: hidden; }
  .dark .progress-bar { background: #3d2a48; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #f472b6, #fb7185); transition: width .3s ease; }
  .grid-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
  }
  @media (min-width: 640px) { .grid-gallery { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; } }
  .gallery-card {
    background: var(--c-card);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 2px 12px rgba(0,0,0,.04);
  }
  .gallery-card:active { transform: scale(.96); }
  .gallery-card img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #fdf2f8; }
  .dark .gallery-card img { background: #1a1025; }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.4);
    display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn .2s;
  }
  .modal-sheet {
    background: var(--c-card);
    border-radius: 24px 24px 0 0;
    width: 100%; max-width: 500px; max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px;
    padding-bottom: calc(24px + var(--safe-bottom));
    animation: slideUp .3s ease-out;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1025; color: #fff; padding: 10px 24px; border-radius: 12px;
    font-size: 14px; z-index: 100;
    animation: toastIn .25s, toastOut .25s 1.75s forwards;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(12px); } }
  .level-H { background: #ecfdf5; color: #059669; }
  .level-M { background: #fef3c7; color: #b45309; }
  .level-L { background: #f1f5f9; color: #64748b; }
  .dark .level-H { background: #064e3b; color: #6ee7b7; }
  .dark .level-M { background: #451a03; color: #fbbf24; }
  .dark .level-L { background: #1e293b; color: #94a3b8; }
  .no-scroll { overflow: hidden; }
</style>
</head>

<body class="min-h-screen" style="padding-bottom:var(--safe-bottom)">

<!-- WeChat banner -->
<div id="wechat-banner" class="hidden fixed top-0 left-0 right-0 z-50 bg-amber-50 dark:bg-amber-950/90 border-b border-amber-200 dark:border-amber-900/50 p-3 text-center text-xs text-amber-800 dark:text-amber-200" style="padding-top:calc(env(safe-area-inset-top) + 8px)">
  📱 <span class="i18n" data-cn="微信内体验受限，点右上角「在浏览器打开」体验更好" data-en="Tap menu → Open in Browser for full experience"></span>
</div>

<!-- Header -->
<header class="sticky top-0 z-30 bg-white/80 dark:bg-[#1a1025]/80 backdrop-blur-lg border-b border-pink-100 dark:border-pink-900/30" style="padding-top:var(--safe-top)">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2 cursor-pointer" onclick="backToLanding()" title="返回首页">
      <span class="text-2xl">🎭</span>
      <div>
        <h1 class="text-sm font-bold truncate i18n" data-cn="SBTI 人格测试" data-en="SBTI Personality"></h1>
        <p class="text-[10px] text-slate-400 truncate i18n" data-cn="测测你的专属人格" data-en="Discover your type"></p>
      </div>
    </div>
    <div class="flex items-center gap-1">
      <button onclick="switchLang()" class="p-2 rounded-lg text-xs font-bold text-pink-500 hover:bg-pink-50 dark:hover:bg-pink-900/30 active:scale-95 transition" id="lang-btn">EN</button>
      <button onclick="toggleTheme()" aria-label="切换深色模式" class="p-2 rounded-lg hover:bg-pink-50 dark:hover:bg-pink-900/30 active:scale-95 transition">
        <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4">

  <!-- ====== LANDING PAGE ====== -->
  <section id="landing" class="pt-6 pb-8 text-center">
    <div class="text-6xl mb-4">🎭</div>
    <h2 class="text-2xl font-extrabold mb-2 i18n" data-cn="SBTI 人格测试" data-en="SBTI Personality Test"></h2>
    <p class="text-slate-500 dark:text-slate-400 mb-6 i18n"
       data-cn="🔥 火爆全网的趣味人格测试 · 30 题解锁你的专属人格<br>已有 27 种结局等你来探索"
       data-en="🔥 Viral personality quiz · 30 questions to unlock your type<br>27 unique outcomes await you"></p>
    <!-- Resume quiz (shown when quiz in progress) -->
    <div id="resume-section" class="hidden mb-4">
      <p class="text-xs text-slate-400 mb-2 i18n" data-cn="📝 你有一个未完成的测试" data-en="📝 You have an unfinished quiz"></p>
      <button onclick="startQuiz(false)" class="btn-primary px-10 py-4 text-lg inline-flex items-center gap-2 w-full justify-center">
        <span class="i18n" data-cn="📋 继续答题" data-en="📋 Continue Quiz"></span>
      </button>
      <p class="text-xs text-slate-400 mt-2">
        <span id="resume-progress"></span>
        <button onclick="startQuiz(true)" class="text-pink-500 underline ml-1 i18n" data-cn="（重新开始）" data-en="(Start over)"></button>
      </p>
    </div>

    <div id="start-section">
      <button onclick="startQuiz(true)" class="btn-primary px-10 py-4 text-lg inline-flex items-center gap-2">
        <span class="i18n" data-cn="✨ 开始测试" data-en="✨ Start Quiz"></span>
      </button>
    </div>
    <p class="text-xs text-slate-400 mt-3 i18n" data-cn="约 3 分钟 · 仅供娱乐" data-en="~3 min · For fun only"></p>
    <p class="text-xs text-pink-400/70 mt-2" id="test-counter"></p>

    <div class="mt-8 pt-6 border-t border-pink-100 dark:border-pink-900/30">
      <p class="text-sm text-slate-500 mb-3 i18n" data-cn="👀 不想做测试？直接看全部 27 种人格 ↓" data-en="👀 Skip the quiz? Browse all 27 types ↓"></p>
      <button onclick="showWiki()" class="text-pink-500 font-semibold text-sm hover:underline i18n" data-cn="📖 查看完整图鉴 →" data-en="📖 View Full Gallery →"></button>
    </div>

    <!-- Test History -->
    <div id="history-section" class="hidden mt-8 pt-6 border-t border-pink-100 dark:border-pink-900/30">
      <p class="text-sm text-slate-500 mb-3 i18n" data-cn="📋 你的测试记录" data-en="📋 Your Test Records"></p>
      <div id="history-list"></div>
      <button onclick="clearHistory()" class="mt-3 text-xs text-slate-400 hover:text-pink-500 underline i18n" data-cn="清空记录" data-en="Clear history"></button>
    </div>
  </section>

  <!-- ====== QUIZ SECTION ====== -->
  <section id="quiz" class="hidden pt-4 pb-8">
    <div class="flex items-center justify-between mb-2 text-xs text-slate-400">
      <span id="quiz-progress-text"></span>
      <span id="quiz-percent"></span>
    </div>
    <div class="progress-bar mb-6"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div class="card p-6 mb-4">
      <p class="text-lg font-semibold leading-relaxed" id="question-text"></p>
    </div>

    <div class="space-y-3 mb-6" id="options-container"></div>

    <div class="flex gap-3">
      <button id="btn-prev" onclick="prevQuestion()" class="flex-1 py-3 rounded-2xl border-2 border-pink-200 dark:border-pink-900/50 font-semibold text-slate-500 hover:bg-pink-50 dark:hover:bg-pink-900/20 transition disabled:opacity-30 disabled:cursor-not-allowed" disabled></button>
      <button id="btn-next" onclick="nextQuestion()" class="flex-[2] py-3 rounded-2xl font-semibold text-white bg-slate-300 dark:bg-slate-700 transition disabled:opacity-30 disabled:cursor-not-allowed" disabled></button>
    </div>
  </section>

  <!-- ====== RESULT SECTION ====== -->
  <section id="result" class="hidden pt-4 pb-8">
    <div class="text-center mb-6" id="result-content"></div>
  </section>

  <!-- ====== WIKI SECTION ====== -->
  <section id="wiki" class="hidden pt-4 pb-8">
    <div class="text-center mb-6">
      <h2 class="text-xl font-extrabold mb-1 i18n" data-cn="📖 27 种结局图鉴" data-en="📖 27 Outcome Gallery"></h2>
      <p class="text-sm text-slate-400 i18n" data-cn="点击卡片查看详情" data-en="Tap a card for details"></p>
      <button onclick="backToLanding()" class="mt-3 text-pink-500 text-sm font-semibold hover:underline i18n" data-cn="← 返回首页去测试" data-en="← Back to quiz"></button>
    </div>

    <div class="mb-4">
      <input type="text" id="wiki-search" oninput="filterWiki()"
        class="w-full px-4 py-3 rounded-2xl border-2 border-pink-100 dark:border-pink-900/30 bg-white dark:bg-[#241835] text-sm focus:outline-none focus:border-pink-300 i18n"
        data-cn-placeholder="🔍 搜索人格名或代号..."
        data-en-placeholder="🔍 Search by name or code...">
    </div>

    <div class="grid-gallery" id="wiki-grid"></div>
  </section>

</main>

<!-- Modal -->
<div id="modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet" id="modal-content"></div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Hidden canvas for share card -->
<canvas id="share-canvas" width="1200" height="1600" style="display:none"></canvas>

<script>
// ==================== DATA ====================
var QUESTIONS = [];
var SPECIAL_QUESTIONS = [];
var DIM_MAP = {};
var OUTCOMES_DATA = null;
var PATTERNS = null;
var DIMENSIONS = null;
var RARITY = null;
var RARITY_RANKED = null; // sorted array for rank lookup

// ==================== STATE ====================
var currentView = 'landing';
var currentQ = 0;
var answers = {};
var result = null;
var lang = 'cn';
var testHistory = [];

// ==================== I18N ====================
function t(cn, en) { return lang === 'cn' ? cn : en; }

function switchLang() {
  lang = lang === 'cn' ? 'en' : 'cn';
  document.documentElement.lang = lang === 'cn' ? 'zh-CN' : 'en';
  localStorage.setItem('sbti-lang', lang);
  document.getElementById('lang-btn').textContent = lang === 'cn' ? 'EN' : '中文';
  refreshI18n();
}

function refreshI18n() {
  document.querySelectorAll('.i18n').forEach(function(el) {
    var cn = el.getAttribute('data-cn');
    var en = el.getAttribute('data-en');
    if (cn && en) el.innerHTML = lang === 'cn' ? cn : en;
  });
  // Update input placeholders
  document.querySelectorAll('.i18n[data-cn-placeholder]').forEach(function(el) {
    el.placeholder = lang === 'cn' ? el.getAttribute('data-cn-placeholder') : el.getAttribute('data-en-placeholder');
  });
  // Update nav button text
  if (currentView === 'quiz') updateNavButtons();
  updateTestCounter();
  // Refresh current view
  if (currentView === 'wiki') buildWikiGrid();
  if (currentView === 'quiz') renderQuestion();
  if (currentView === 'result' && result) showResult();
  if (currentView === 'landing') { renderHistory(); checkResumeQuiz(); }
}

// ==================== IMAGE PATH FIX ====================
// ponytail: map renamed images, old→new. Remove when outcomes.json is regenerated.
var IMAGE_MAP = {
  'images/ATM-er.png': 'images/ATMM.png',
  'images/ATM-er': 'images/ATMM',
  'images/Dior-s.jpg': 'images/DIOR.png',
  'images/Dior-s': 'images/DIOR',
  'images/DRUNK.png': 'images/DRNK.png',
  'images/DRUNK': 'images/DRNK',
  'images/FUCK.png': 'images/FCUK.png',
  'images/FUCK': 'images/FCUK',
  'images/GOGO.png': 'images/GOOO.png',
  'images/GOGO': 'images/GOOO',
  'images/IMFW.png': 'images/IMWL.png',
  'images/IMFW': 'images/IMWL',
  'images/JOKE-R.jpg': 'images/JOKER.png',
  'images/JOKE-R': 'images/JOKER',
  'images/LOVE-R.png': 'images/LOVER.png',
  'images/LOVE-R': 'images/LOVER',
  'images/OJBK.png': 'images/OBJK.png',
  'images/OJBK': 'images/OBJK',
  'images/POOR.png': 'images/POKR.png',
  'images/POOR': 'images/POKR',
  'images/THAN-K.png': 'images/THNK.png',
  'images/THAN-K': 'images/THNK',
  'images/THIN-K.png': 'images/THNK.png',
  'images/THIN-K': 'images/THNK',
  'images/WOC.png': 'images/WOCL.png',
  'images/WOC': 'images/WOCL'
};

function fixImagePath(path) {
  return IMAGE_MAP[path] || path;
}

// ==================== INIT ====================
async function init() {
  try {
    var qRes = await fetch('data/questions.json');
    var qData = await qRes.json();
    QUESTIONS = qData.questions;
    SPECIAL_QUESTIONS = qData.specialQuestions;
    DIM_MAP = qData.dimensionMap;

    var oRes = await fetch('web/data/outcomes.json');
    OUTCOMES_DATA = await oRes.json();

    var pRes = await fetch('data/patterns.json');
    PATTERNS = await pRes.json();

    var dRes = await fetch('data/dimensions.json');
    DIMENSIONS = await dRes.json();

    var rRes = await fetch('data/rarity.json');
    RARITY = await rRes.json();
    // Build ranked array for easy lookup
    var entries = Object.entries(RARITY.rarity).map(function(e) { return {code:e[0], pct:e[1]}; });
    entries.sort(function(a,b) { return a.pct - b.pct; });
    RARITY_RANKED = entries;
  } catch(e) {
    console.error('Data load failed:', e);
  }

  // ponytail: save original quiz HTML — showDrinkQuestions() overwrites it
  window._quizHTML = document.getElementById('quiz').innerHTML;

  if (localStorage.getItem('sbti-lang') === 'en') { lang = 'en'; switchLang(); }
  loadHistory();
  refreshI18n();
  if (isWechat()) document.getElementById('wechat-banner').classList.remove('hidden');
  handleHash();
  window.addEventListener('hashchange', handleHash);
}

// ==================== NAVIGATION ====================
function handleHash() {
  var h = location.hash;
  if (h.startsWith('#quiz')) startQuiz();
  else if (h.startsWith('#result')) restoreResult();
  else if (h.startsWith('#wiki')) showWiki();
  else backToLanding();
}

function showView(id) {
  ['landing','quiz','result','wiki'].forEach(function(v) {
    document.getElementById(v).classList.toggle('hidden', v !== id);
  });
  currentView = id;
  window.scrollTo({top:0,behavior:'smooth'});
}

function backToLanding() { showView('landing'); renderHistory(); checkResumeQuiz(); history.replaceState(null,'','#'); }

function checkResumeQuiz() {
  var resumeSection = document.getElementById('resume-section');
  var startSection = document.getElementById('start-section');
  if (!resumeSection || !startSection) return;
  try {
    var saved = JSON.parse(localStorage.getItem('sbti-quiz') || 'null');
    if (saved && saved.currentQ > 0 && saved.answers && Object.keys(saved.answers).length > 0) {
      resumeSection.classList.remove('hidden');
      startSection.classList.add('hidden');
      var done = Object.keys(saved.answers).length;
      var total = 30;
      var el = document.getElementById('resume-progress');
      if (el) el.textContent = t('已完成 ' + done + ' / ' + total + ' 题', 'Done: ' + done + ' / ' + total);
      return;
    }
  } catch(e) {}
  resumeSection.classList.add('hidden');
  startSection.classList.remove('hidden');
}

function showWiki() { showView('wiki'); buildWikiGrid(); history.replaceState(null,'','#wiki'); }

// ==================== QUIZ ====================
function startQuiz(fresh) {
  if (!fresh) {
    try {
      var saved = JSON.parse(localStorage.getItem('sbti-quiz') || 'null');
      if (saved && saved.currentQ > 0 && saved.answers) {
        answers = saved.answers;
        currentQ = saved.currentQ;
        showView('quiz');
        history.replaceState(null,'','#quiz');
        renderQuestion();
        return;
      }
    } catch(e) {}
  }
  answers = {};
  result = null;
  currentQ = 0;
  localStorage.removeItem('sbti-quiz');
  localStorage.removeItem('sbti-result');
  // Restore original quiz DOM (showDrinkQuestions may have overwritten it)
  if (window._quizHTML) document.getElementById('quiz').innerHTML = window._quizHTML;
  showView('quiz');
  history.replaceState(null,'','#quiz');
  renderQuestion();
}

function renderQuestion() {
  var qs = QUESTIONS;
  var total = qs.length;
  var q = qs[currentQ];
  if (!q) { finishQuiz(); return; }

  document.getElementById('question-text').textContent = q.text;

  var sel = answers[q.id];
  var html = '';
  q.options.forEach(function(o) {
    var cls = sel === o.value ? ' selected' : '';
    html += '<button class="btn-option w-full' + cls + '" onclick="selectOption(\'' + q.id + '\',' + o.value + ',this)">';
    html += '<span class="emoji">' + (o.emoji || '') + '</span>';
    html += '<span class="flex-1">' + o.text + '</span>';
    html += '</button>';
  });
  document.getElementById('options-container').innerHTML = html;

  var pct = Math.round((currentQ + 1) / total * 100);
  document.getElementById('quiz-progress-text').textContent = t('第 ' + (currentQ + 1) + ' / ' + total + ' 题', 'Q ' + (currentQ + 1) + ' / ' + total);
  document.getElementById('quiz-percent').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';

  updateNavButtons();
}

function selectOption(qid, value, el) {
  answers[qid] = value;
  document.querySelectorAll('#options-container .btn-option').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  updateNavButtons();
  saveQuizState();
  // Auto-advance after short delay for tap feedback
  setTimeout(function() { nextQuestion(); }, 350);
}

function updateNavButtons() {
  var q = QUESTIONS[currentQ];
  var hasAns = q && answers[q.id] !== undefined;
  var btnNext = document.getElementById('btn-next');
  var btnPrev = document.getElementById('btn-prev');
  var isFirst = currentQ === 0;
  var isLast = currentQ >= QUESTIONS.length - 1;

  btnPrev.disabled = isFirst;
  btnPrev.textContent = t('← 上一题', '← Back');
  btnNext.disabled = !hasAns;

  if (hasAns) {
    btnNext.className = 'btn-primary flex-[2] py-3 rounded-2xl font-semibold';
    btnNext.textContent = isLast ? t('✨ 查看结果', '✨ See Result') : t('下一题 →', 'Next →');
  } else {
    btnNext.className = 'flex-[2] py-3 rounded-2xl font-semibold text-white bg-slate-300 dark:bg-slate-700 transition disabled:opacity-30 disabled:cursor-not-allowed';
  }
}

function nextQuestion() {
  var q = QUESTIONS[currentQ];
  if (answers[q.id] === undefined) return;
  if (currentQ >= QUESTIONS.length - 1) {
    if (answers['drink_gate_q1'] === undefined) { showDrinkQuestions(); return; }
    finishQuiz();
    return;
  }
  currentQ++;
  renderQuestion();
  saveQuizState();
}

function saveQuizState() {
  try {
    localStorage.setItem('sbti-quiz', JSON.stringify({ currentQ: currentQ, answers: answers, view: 'quiz' }));
  } catch(e) {}
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

function showDrinkQuestions() {
  var html = '<div class="text-center mb-4"><span class="text-sm text-pink-500 font-semibold">🍶 ' + t('最后两题~', 'Last two~') + '</span></div>';
  SPECIAL_QUESTIONS.forEach(function(sq) {
    html += '<div class="card p-6 mb-4"><p class="text-lg font-semibold leading-relaxed">' + sq.text + '</p></div>';

      html += '<button class="btn-option w-full" onclick="selectDrinkOption(\'' + sq.id + '\',' + o.value + ',this)">';

function resumeAfterDrink() {
  if (currentQ >= QUESTIONS.length - 1) { finishQuiz(); return; }
  currentQ = 12;
  renderQuestion();
}

function selectDrinkOption(qid, value, el) {
  answers[qid] = value;

// ==================== SCORING ====================
function finishQuiz() {
  localStorage.removeItem('sbti-quiz');
  incrementTestCounter();
  var dimOrder = DIMENSIONS.order;
  var dimScores = {};
  var userVector = [];

  dimOrder.forEach(function(dim) {
    var qs = DIM_MAP[dim];
    var sum = 0;
    if (qs) qs.forEach(function(qid) { sum += (answers[qid] || 2); });
    if (sum <= 3) { dimScores[dim] = 'L'; userVector.push('L'); }
    else if (sum === 4) { dimScores[dim] = 'M'; userVector.push('M'); }
    else { dimScores[dim] = 'H'; userVector.push('H'); }
  });

  // DRUNK trigger
  if (answers['drink_gate_q2'] === 2) {
    result = cloneOutcome(findOutcome('DRUNK'));
    result.similarity = 100;
    result.isDrunk = true;
    result.dimScores = dimScores;
    result.userVector = userVector;
    showResult();
    return;
  }

  // Match 25 normal types — score-difference distance (L=1,M=2,H=3)
  var toScore = function(v) { return v === 'L' ? 1 : v === 'M' ? 2 : 3; };
  var userScores = userVector.map(toScore);
  var best = null, bestDist = Infinity, exactHits = 0;
  PATTERNS.normal_types.forEach(function(t) {
    var pattern = t.pattern.replace(/-/g, '').split('');
    var dist = 0, hits = 0;
    for (var i = 0; i < 15; i++) {
      var ps = toScore(pattern[i]);
      dist += Math.abs(userScores[i] - ps);
      if (userVector[i] === pattern[i]) hits++;
    }
    if (dist < bestDist) { bestDist = dist; best = t; exactHits = hits; }
  });

  var similarity = Math.max(0, Math.round((1 - bestDist / 30) * 100));

  if (similarity < 60) {
    result = cloneOutcome(findOutcome('HHHH'));
    result.similarity = similarity;
    result.isFallback = true;
  } else {
    result = cloneOutcome(findOutcome(best.code));
    result.similarity = similarity;
  }
  result.dimScores = dimScores;
  result.userVector = userVector;
  result.bestDist = bestDist;
  showResult();
}

function findOutcome(code) {
  var outcomes = OUTCOMES_DATA.outcomes;
  for (var i = 0; i < outcomes.length; i++) {
    if (outcomes[i].code === code) return outcomes[i];
  }
  return outcomes[0];
}

function cloneOutcome(o) { return JSON.parse(JSON.stringify(o)); }

function getRarity(code) {
  if (!RARITY) return { pct: '?', rank: '?', label: '?' };
  var pct = RARITY.rarity[code] || 0;
  // Find rank from sorted array
  var rank = 0;
  if (RARITY_RANKED) {
    for (var i = 0; i < RARITY_RANKED.length; i++) {
      if (RARITY_RANKED[i].code === code) { rank = i + 1; break; }
    }
  }
  var label = pct < 1 ? t('极稀有', 'Ultra Rare') : pct < 3 ? t('稀有', 'Rare') : pct < 5 ? t('中等', 'Uncommon') : t('较常见', 'Common');
  var oneIn = pct > 0 ? Math.round(100 / pct) : '?';
  return { pct: pct, rank: rank, label: label, oneIn: oneIn };
}

// ==================== TEST HISTORY ====================
function loadHistory() {
  try {
    var saved = localStorage.getItem('sbti-history');
    testHistory = saved ? JSON.parse(saved) : [];
  } catch(e) { testHistory = []; }
}

function saveToHistory(r) {
  loadHistory(); // ensure fresh
  // Remove duplicate by code+timestamp if same timestamp already exists
  var entry = {
    code: r.code,
    cn: r.cn,
    intro: r.intro,
    similarity: r.similarity,
    isDrunk: !!r.isDrunk,
    isFallback: !!r.isFallback,
    dimScores: r.dimScores,
    userVector: r.userVector,
    timestamp: Date.now()
  };
  // Remove old entry with same code if it was from today (dedup within same day)
  var today = new Date().toDateString();
  testHistory = testHistory.filter(function(e) {
    return new Date(e.timestamp).toDateString() !== today || e.code !== entry.code;
  });
  testHistory.push(entry);
  // Keep max 20 entries
  if (testHistory.length > 20) testHistory = testHistory.slice(-20);
  try {
    localStorage.setItem('sbti-history', JSON.stringify(testHistory));
  } catch(e) {}
}

function renderHistory() {
  var section = document.getElementById('history-section');
  var list = document.getElementById('history-list');
  if (!section || !list) return;
  if (!testHistory.length) {
    section.classList.add('hidden');
    return;
  }
  section.classList.remove('hidden');
  // Show most recent first
  var entries = testHistory.slice().reverse();
  var html = '';
  entries.forEach(function(entry) {
    var date = new Date(entry.timestamp);
    var dateStr = date.getFullYear() + '/' + (date.getMonth() + 1) + '/' + date.getDate();
    var icon = entry.isDrunk ? '🍶' : '🎭';
    var sub = entry.isDrunk
      ? t('隐藏人格已激活', 'Hidden type')
      : t('匹配度 ', 'Match: ') + entry.similarity + '%';
    html += '<div class="card p-3 flex items-center gap-3 cursor-pointer hover:shadow-md transition mb-2" onclick="viewHistoryResult(' + entry.timestamp + ')">';
    html += '<span class="text-2xl flex-shrink-0">' + icon + '</span>';
    html += '<div class="flex-1 min-w-0">';
    html += '<p class="font-bold text-sm truncate">' + entry.code + ' · ' + entry.cn + '</p>';
    html += '<p class="text-xs text-slate-400 truncate">' + sub + ' · ' + dateStr + '</p>';
    html += '</div>';
    html += '<span class="text-slate-300 text-lg flex-shrink-0">→</span>';
    html += '</div>';
  });
  list.innerHTML = html;
}

function viewHistoryResult(ts) {
  var entry = testHistory.find(function(e) { return e.timestamp === ts; });
  if (!entry) return;
  // Reconstruct result object from history entry
  var o = findOutcome(entry.code);
  if (!o) return;
  result = cloneOutcome(o);
  result.similarity = entry.similarity;
  result.isDrunk = entry.isDrunk;
  result.isFallback = entry.isFallback;
  result.dimScores = entry.dimScores;
  result.userVector = entry.userVector;
  showResult();
}

function clearHistory() {
  if (!confirm(t('确定清空所有测试记录？', 'Clear all test records?'))) return;
  testHistory = [];
  localStorage.removeItem('sbti-history');
  renderHistory();
  toast(t('记录已清空', 'History cleared'));
}

function restoreResult() {
  try {
    var saved = localStorage.getItem('sbti-result');
    if (saved) { result = JSON.parse(saved); showResult(); return; }
  } catch(e) {}
  // Also check history for the code in the URL hash
  var hashCode = location.hash.replace('#result/', '').replace('#result', '');
  if (hashCode && testHistory.length) {
    loadHistory();
    var entry = testHistory.slice().reverse().find(function(e) { return e.code === hashCode; });
    if (entry) { viewHistoryResult(entry.timestamp); return; }
  }
  backToLanding();
}

// ==================== SHARING ====================
function generateShareCard() {
  if (!result) return;
  var canvas = document.getElementById('share-canvas');
  var ctx = canvas.getContext('2d');
  var W = 1200, H = 1600;
  canvas.width = W;
  canvas.height = H;

  // 2x scale — all coords below are in logical 600x800 space
  ctx.scale(2, 2);

  // Background gradient
  var bg = ctx.createLinearGradient(0, 0, 0, 800);
  bg.addColorStop(0, '#fdf2f8');
  bg.addColorStop(0.5, '#fce7f3');
  bg.addColorStop(1, '#fdf2f8');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 600, 800);

  // Decorative circles
  ctx.fillStyle = 'rgba(244,114,182,.06)';
  ctx.beginPath(); ctx.arc(500, 120, 160, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(80, 650, 200, 0, Math.PI*2); ctx.fill();

  // Top title
  ctx.fillStyle = '#4a2040';
  ctx.font = 'bold 34px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('SBTI ' + t('人格测试', 'Personality Test'), 300, 70);
  ctx.font = '16px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillStyle = '#9d7a8f';
  ctx.fillText(t('测测你是什么人格', 'Discover your type'), 300, 100);

  // White result card
  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(244,114,182,.15)';
  ctx.shadowBlur = 30;
  roundRectCanvas(ctx, 40, 130, 520, 470, 24);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Code
  ctx.fillStyle = '#f472b6';
  ctx.font = 'bold 52px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(result.code, 300, 220);

  // Chinese name
  ctx.fillStyle = '#4a2040';
  ctx.font = 'bold 30px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText(result.cn, 300, 265);

  // Intro quote
  ctx.fillStyle = '#f472b6';
  ctx.font = 'italic 18px "PingFang SC","Microsoft YaHei",sans-serif';
  ctx.fillText('「' + result.intro + '」', 300, 310);

  // Match info
  ctx.fillStyle = '#9d7a8f';
  ctx.font = '15px "PingFang SC","Microsoft YaHei",sans-serif';
  var matchText = result.isDrunk ? '🍶 ' + t('隐藏人格已激活', 'Hidden type') : '🎯 ' + t('匹配度 ', 'Match: ') + result.similarity + '%';
  ctx.fillText(matchText, 300, 350);

  var rarity = getRarity(result.code);
  ctx.fillText('📊 ' + t('稀有度 ', 'Rarity: ') + rarity.pct + '% · ' + t('约 1/', '~1/') + rarity.oneIn, 300, 378);

  // Character image — draw with better quality
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    // Center crop to square, draw at higher res
    var size = 200;
    var x = 300 - size/2;
    var y = 400;
    ctx.drawImage(img, x, y, size, size);
    drawFooter();
  };
  img.onerror = function() {
    ctx.font = '90px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🎭', 300, 520);
    drawFooter();
  };
  img.src = fixImagePath(result.image || 'images/' + result.code + '.png');

  function drawFooter() {
    ctx.textAlign = 'center';

    // Hint text
    ctx.fillStyle = '#9d7a8f';
    ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(t('🔥 27 种人格结局等你发现', '🔥 27 personality types await'), 300, 680);

    // CTA pill
    ctx.fillStyle = 'rgba(244,114,182,.1)';
    roundRectCanvas(ctx, 110, 710, 380, 60, 30);
    ctx.fill();
    ctx.fillStyle = '#f472b6';
    ctx.font = 'bold 24px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText(t('🔍 小红书搜「SBTI人格测试」', '🔍 Try the SBTI Quiz!'), 300, 750);

    // Download — reset scale before export so PNG is full 1200x1600
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    var link = document.createElement('a');
    link.download = 'SBTI-' + result.code + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast(t('📸 分享卡片已保存，快去发小红书吧！', '📸 Card saved! Share it now!'));
  }
}

function copyShareLink() {
  var url = location.origin + location.pathname + '#result/' + (result ? result.code : '');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function() {
      toast(t('🔗 链接已复制，分享给朋友吧~', '🔗 Link copied!'));
    });
  } else {
    prompt('Copy:', url);
  }
}

// ==================== UTILS ====================
function roundRectCanvas(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function toast(msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 2000);
}

function toggleTheme() {
  var isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('sbti-theme', isDark ? 'dark' : 'light');
}

function isWechat() { return /micromessenger/i.test(navigator.userAgent); }

// Simple pageview counter (localStorage-based, approximate unique visitors)
(function(){
  var key = 'sbti-visit';
  var now = Date.now();
  var prev = localStorage.getItem(key);
  // Count as new visit if never visited or >30min since last visit
  if (!prev || (now - parseInt(prev)) > 1800000) {
    localStorage.setItem(key, now);
    // ponytail: sendBeacon to a no-op — replace URL with your own analytics endpoint
    if (navigator.sendBeacon) {
      navigator.sendBeacon('https://sbti-wiki.pages.dev/cdn-cgi/rum?', JSON.stringify({page:location.pathname}));
    }
  }
  // Show test completion counter
  fetchTestCount();
})();

// Global test completion counter via Cloudflare Pages Function
var globalTestCount = 0;

function updateTestCounter() {
  var el = document.getElementById('test-counter');
  if (!el) return;
  if (globalTestCount > 0) {
    el.textContent = (lang === 'cn' ? '📊 全球已有 ' : '📊 ') + globalTestCount.toLocaleString() + (lang === 'cn' ? ' 人完成了测试' : ' people have tested');
  }
}

async function fetchTestCount() {
  try {
    var res = await fetch('/api/counter');
    if (res.ok) {
      var data = await res.json();
      globalTestCount = data.count || 0;
      updateTestCounter();
    }
  } catch (e) {
    // Degrade silently — counter just won't show
  }
}

async function incrementTestCounter() {
  try {
    var res = await fetch('/api/counter', { method: 'POST' });
    if (res.ok) {
      var data = await res.json();
      globalTestCount = data.count || 0;
      updateTestCounter();
    }
  } catch (e) { /* degrade silently */ }
}
