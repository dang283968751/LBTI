<style>
  :root {
    --dim-l: #c98b3a; /* Love - warm gold */
    --dim-b: #1c648e; /* Boundary - cool teal */
    --dim-t: #006e20; /* Tempo - sage green */
    --dim-i: #795465; /* Influence - rose pink */
  }

  body {
    background: #f7f9fb;
    color: #191c1e;
    min-height: 100dvh;
    overflow-x: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }

  .aurora-bg {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(circle at 0% 0%, #ffd8e7 0%, transparent 45%),
      radial-gradient(circle at 100% 0%, #cae6ff 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #93f993 0%, transparent 45%),
      radial-gradient(circle at 0% 100%, #f7f9fb 0%, transparent 45%);
    background-size: 200% 200%;
    animation: aurora-drift 18s ease infinite;
    opacity: 0.45;
  }
  @keyframes aurora-drift {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }

  .glass {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.5);
  }
  .glass-solid {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.5);
  }

  /* Option buttons */
  .opt-btn {
    transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    position: relative;
  }
  .opt-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.8); }
  .opt-btn.selected {
    background: #795465 !important;
    color: #fff !important;
    border-color: #795465 !important;
    box-shadow: 0 4px 20px rgba(121,84,101,0.25);
  }

  /* View transitions */
  .view {
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .view.hidden {
    display: none;
    opacity: 0;
    transform: translateY(16px);
  }
  .view.active {
    display: flex;
    opacity: 1;
    transform: translateY(0);
  }

  /* Progress bar */
  .progress-fill {
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    background: linear-gradient(90deg, #c98b3a, #795465, #1c648e, #006e20);
    background-size: 300% 100%;
    animation: progress-shift 3s linear infinite;
  }
  @keyframes progress-shift {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  /* Dimension bar animation */
  .dim-bar-fill {
    transition: width 1.4s cubic-bezier(0.22,1,0.36,1);
  }

  /* Floating blobs */
  .blob {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: -1;
    filter: blur(80px); opacity: 0.35;
    animation: blob-float 14s ease-in-out infinite;
  }
  .blob-2 { animation-delay: -5s; animation-duration: 18s; }
  @keyframes blob-float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-30px) scale(1.05); }
    66% { transform: translate(-20px,20px) scale(0.95); }
  }

  /* Stability gauge */
  .gauge-ring {
    stroke-dasharray: 251.2;
    stroke-dashoffset: 251.2;
    transition: stroke-dashoffset 1.6s cubic-bezier(0.22,1,0.36,1);
  }

  /* Result card for sharing */
  .share-card {
    background: linear-gradient(160deg, rgba(255,255,255,0.7) 0%, rgba(247,249,251,0.85) 100%);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.5);
  }

  /* Type badge glow */
  .type-glow {
    filter: drop-shadow(0 0 24px rgba(121,84,101,0.15));
  }

  /* Fade in sequence */
  .fade-seq > * { opacity: 0; animation: fade-up 0.6s ease forwards; }
  .fade-seq > *:nth-child(1) { animation-delay: 0.1s; }
  .fade-seq > *:nth-child(2) { animation-delay: 0.2s; }
  .fade-seq > *:nth-child(3) { animation-delay: 0.3s; }
  .fade-seq > *:nth-child(4) { animation-delay: 0.4s; }
  .fade-seq > *:nth-child(5) { animation-delay: 0.5s; }
  .fade-seq > *:nth-child(6) { animation-delay: 0.6s; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar hide */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Pulse dot for calculating */
  .pulse-dot {
    width: 12px; height: 12px; border-radius: 50%; background: #795465;
    animation: pulse-bounce 0.6s ease infinite alternate;
  }
  .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse-bounce {
    to { transform: translateY(-16px); opacity: 0.4; }
  }
</style>
</head>

<!-- Background -->
<div class="aurora-bg"></div>

  </div>

  FPDM: { name:"焰火女孩", emoji:"🎆", tagline:"情绪感染力极强。", color:"#006e20" },
  FOGL: { name:"晨露女孩", emoji:"🌼", tagline:"治愈型连接。", color:"#795465" },
  FOGM: { name:"日落女孩", emoji:"🌅", tagline:"别人眼里的氛围中心。", color:"#795465" },
  FODL: { name:"银河女孩", emoji:"✨", tagline:"自由浪漫。", color:"#795465" },
  FODM: { name:"海妖女孩", emoji:"🪩", tagline:"社交吸引力天花板。", color:"#795465" },
};

// Personal quotes per type
const PERSONAL_QUOTES = {
  SPGL: "你不是慢热，你只是把温度留给了值得的人。",
  SPGM: "安静是你的力量，不是你的缺陷。靠近你的人都会发现宝藏。",

  SPDM: "低调是一种高级的自信，爆发时谁都看得见。",

  SOGM: "温柔从来不是软弱，是你选择的力量。",
  SODL: "保持距离不是冷漠，是你保护自己能量的方式。",
  SODM: "慢熟的人，往往最值得等。",
  FPGL: "你热情又清醒，亲近但不越界。这是最高级的情商。",

};

// Dimension config
const DIM_CONFIG = {
  L: { label:"Love · 心动速度", pole1:"Slow 慢热", pole2:"Fast 共鸣", color:"#c98b3a", bg:"rgba(201,139,58,0.08)" },
  B: { label:"Boundary · 社交温度", pole1:"Protected 保护", pole2:"Open 开放", color:"#1c648e", bg:"rgba(28,100,142,0.08)" },
  T: { label:"Tempo · 安全感需求", pole1:"Grounded 平稳", pole2:"Dynamic 变化", color:"#006e20", bg:"rgba(0,110,32,0.08)" },
  I: { label:"Influence · 气场浓度", pole1:"Light 柔光", pole2:"Magnetic 磁场", color:"#795465", bg:"rgba(121,84,101,0.08)" },
};

// Dimension label mapping for result display
const DIM_LABELS = {
  L: { first:"Slow 慢热", second:"Fast 共鸣" },
  B: { first:"Protected 保护", second:"Open 开放" },
  T: { first:"Grounded 平稳", second:"Dynamic 变化" },
  I: { first:"Light 柔光", second:"Magnetic 磁场" },
};

// ==================== STATE ====================
let currentQuestion = 0;
let answers = new Array(24).fill(null); // 0-indexed, stores 1-5
let selectedValue = null;

// ==================== VIEW SWITCHING ====================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => { v.classList.add('hidden'); v.classList.remove('active'); });
  const target = document.getElementById('view-' + id);
  target.classList.remove('hidden');
  // ponytail: force reflow so transition plays
  void target.offsetWidth;
  target.classList.add('active');
  window.scrollTo(0, 0);
}

// ==================== QUIZ LOGIC ====================
function startQuiz() {
  currentQuestion = 0;
  answers = new Array(24).fill(null);
  selectedValue = null;
  showView('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQuestion];
  selectedValue = answers[currentQuestion];

  document.getElementById('dimension-tag').textContent = q.dim;
  document.getElementById('question-text').textContent = (currentQuestion + 1) + '. ' + q.text;
  document.getElementById('progress-text').textContent = (currentQuestion + 1) + ' / 24';

  // Progress bar
  const pct = ((currentQuestion) / 24 * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';

  // Render options
  const container = document.getElementById('options-container');
  container.innerHTML = '';
  OPTIONS.forEach((opt, i) => {
    const val = i + 1; // 1-5
    const btn = document.createElement('button');
    btn.className = 'opt-btn glass w-full flex items-center justify-between px-6 py-5 rounded-xl text-left';
    if (selectedValue === val) btn.classList.add('selected');

    btn.innerHTML = `
      <span class="font-body-lg ${selectedValue === val ? 'text-white' : 'text-on-surface-variant'}">${opt}</span>
      <div class="w-6 h-6 rounded-full border-2 ${selectedValue === val ? 'border-white' : 'border-outline-variant'} flex items-center justify-center shrink-0">
        <div class="w-3 h-3 rounded-full ${selectedValue === val ? 'bg-white' : 'bg-transparent'} transition-all"></div>
      </div>`;
    btn.onclick = () => selectOption(val);
    container.appendChild(btn);
  });

  // Update nav buttons
  document.getElementById('btn-prev').disabled = currentQuestion === 0;
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentQuestion === 23 ? '查看结果 →' : '下一题 →';
  btnNext.disabled = selectedValue === null;
}

function selectOption(val) {
  selectedValue = val;
  answers[currentQuestion] = val;
  document.getElementById('btn-next').disabled = false;

  // Update button styles
  const buttons = document.querySelectorAll('.opt-btn');
  buttons.forEach(b => b.classList.remove('selected'));
  buttons.forEach((b, i) => {
    if (i + 1 === val) b.classList.add('selected');
    const span = b.querySelector('span');
    const circle = b.querySelector('.w-6');
    const dot = b.querySelector('.w-3');
    if (i + 1 === val) {
      span.className = 'font-body-lg text-white';
      circle.className = 'w-6 h-6 rounded-full border-2 border-white flex items-center justify-center shrink-0';
      dot.className = 'w-3 h-3 rounded-full bg-white transition-all';
    } else {
      span.className = 'font-body-lg text-on-surface-variant';
      circle.className = 'w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center shrink-0';
      dot.className = 'w-3 h-3 rounded-full bg-transparent transition-all';
    }
  });

  // Auto-advance after short delay
  setTimeout(() => {
    if (currentQuestion < 23) {
      nextQuestion();
    } else {
      calculateResult();
    }
  }, 400);
}

function nextQuestion() {
  if (selectedValue === null && currentQuestion < 23) return;
  if (currentQuestion < 23) {
    currentQuestion++;
    selectedValue = answers[currentQuestion];
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    calculateResult();
  }
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    selectedValue = answers[currentQuestion];
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ==================== SCORING ENGINE ====================
function flip(score) { return 6 - score; }

function calculateResult() {
  // Check if all questions answered
  if (answers.some(a => a === null)) {
    // Find first unanswered and go there
    const idx = answers.findIndex(a => a === null);
    if (idx >= 0) {
      currentQuestion = idx;
      selectedValue = null;
      renderQuestion();
      alert('请回答所有题目后再查看结果～');
      return;
    }
  }

  showView('calculating');

  // Compute raw scores (ponytail: direct formula from spec)
  const L_raw = answers[0] + flip(answers[1]) + answers[2] + flip(answers[3]) + answers[4] + flip(answers[5]);
  const B_raw = flip(answers[6]) + answers[7] + flip(answers[8]) + answers[9] + flip(answers[10]) + flip(answers[11]);
  const T_raw = answers[12] + flip(answers[13]) + answers[14] + flip(answers[15]) + answers[16] + flip(answers[17]);
  const I_raw = flip(answers[18]) + answers[19] + flip(answers[20]) + answers[21] + flip(answers[22]) + answers[23];

  function getTendency(raw) {
    if (raw > 15) return { pct: Math.round(raw / 30 * 100), isFirst: true };
    else return { pct: Math.round((30 - raw) / 30 * 100), isFirst: false };
  }

  const L = getTendency(L_raw);
  const B = getTendency(B_raw);
  const T = getTendency(T_raw);
  const I_tend = getTendency(I_raw);

  // Build type code
  const typeCode =
    (L.isFirst ? 'S' : 'F') +
    (B.isFirst ? 'P' : 'O') +
    (T.isFirst ? 'G' : 'D') +
    (I_tend.isFirst ? 'L' : 'M');

  // Stability index
  const deviations = answers.map(s => Math.abs(s - 3));
  const meanDev = deviations.reduce((a, b) => a + b, 0) / 24;
  const stability = Math.round((meanDev / 2) * 100);

  // Store result
  const result = { typeCode, L, B, T, I: I_tend, stability, raw: { L_raw, B_raw, T_raw, I_raw } };

  // Delay for animation
  setTimeout(() => renderResult(result), 1800);
}

// ==================== RESULT RENDERING ====================
function renderResult(r) {
  showView('result');
  const type = TYPES[r.typeCode];
  const quote = PERSONAL_QUOTES[r.typeCode];

  // Type info
  document.getElementById('type-emoji-display').textContent = type.emoji;
  document.getElementById('type-name-display').textContent = type.name;
  document.getElementById('type-code-display').textContent = r.typeCode + ' · ' + type.name;
  document.getElementById('type-tagline').textContent = type.tagline;
  document.getElementById('personal-quote').textContent = '“' + quote + '”';

  // Stability gauge
  const ring = document.getElementById('stability-ring');
  const circumference = 2 * Math.PI * 40; // r=40
  const offset = circumference - (r.stability / 100) * circumference;
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 200);
  document.getElementById('stability-value').textContent = r.stability;

  let stabilityLabel;
  if (r.stability < 55) stabilityLabel = '最近状态变化较大，结果仅供参考';
  else if (r.stability <= 75) stabilityLabel = '结果可参考，基本反映当前状态';
  else stabilityLabel = '状态较稳定，结果有较高一致性';
  document.getElementById('stability-label').textContent = stabilityLabel;

  // Dimension bars
  const dims = [
    { key:'L', data:r.L, config:DIM_CONFIG.L, labels:DIM_LABELS.L },
    { key:'B', data:r.B, config:DIM_CONFIG.B, labels:DIM_LABELS.B },
    { key:'T', data:r.T, config:DIM_CONFIG.T, labels:DIM_LABELS.T },
    { key:'I', data:r.I, config:DIM_CONFIG.I, labels:DIM_LABELS.I },
  ];

  const barsContainer = document.getElementById('dim-bars-container');
  barsContainer.innerHTML = '';
  dims.forEach(d => {
    const tendency = d.data.isFirst ? d.labels.first : d.labels.second;
    const div = document.createElement('div');
    div.className = 'space-y-2';
    div.innerHTML = `
      <div class="flex justify-between items-end">
        <div>
          <span class="font-label-caps text-label-caps" style="color:${d.config.color}">${d.config.label}</span>
          <span class="text-[10px] text-on-surface-variant/60 ml-2">${tendency}</span>
        </div>
        <span class="font-bold text-lg" style="color:${d.config.color}">${d.data.pct}%</span>
      </div>
      <div class="h-2 w-full rounded-full overflow-hidden" style="background:${d.config.bg}">
        <div class="dim-bar-fill h-full rounded-full" style="width:0%;background:${d.config.color}"
          data-width="${d.data.pct}%"></div>
      </div>`;
    barsContainer.appendChild(div);
  });

  // Animate bars after render
  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width;
    });
  }, 300);

  // Personal analysis
  document.getElementById('personal-analysis').textContent = generateAnalysis(r);

  // Type gallery
  renderGallery(r.typeCode);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function generateAnalysis(r) {
  const type = TYPES[r.typeCode];
  const dims = [
    { key:'L', data:r.L, name:'心动速度', pole1:'慢热', pole2:'共鸣' },
    { key:'B', data:r.B, name:'社交边界', pole1:'保护型', pole2:'开放型' },
    { key:'T', data:r.T, name:'生活节奏', pole1:'平稳', pole2:'变化' },
    { key:'I', data:r.I, name:'存在方式', pole1:'柔光', pole2:'磁场' },
  ];

  const parts = dims.map(d => {
    const pole = d.data.isFirst ? d.pole1 : d.pole2;
    return `你的${d.name}偏向「${pole}」（${d.data.pct}%），`;
  });

  return `作为「${type.name}」，${parts.join('')}共同构成了你独特的能量光谱。${type.tagline}理解自己的能量类型，不是给自己贴标签，而是更好地理解自己的节奏与边界。`;
}

function renderGallery(currentCode) {
  const gallery = document.getElementById('type-gallery');
  gallery.innerHTML = '';
  Object.entries(TYPES).forEach(([code, t]) => {
    const isCurrent = code === currentCode;
    const div = document.createElement('div');
    div.className = `flex items-center gap-2 p-2 rounded-xl text-sm ${isCurrent ? 'bg-primary/10 border border-primary/20' : 'opacity-50'}`;
    div.innerHTML = `<span class="text-xl">${t.emoji}</span><span class="text-[11px] font-medium">${code}<br/>${t.name}</span>`;
    gallery.appendChild(div);
  });
}

// ==================== SHARE ====================
function shareResult() {
  const typeCode = document.getElementById('type-code-display').textContent.split(' · ')[0];
  const type = TYPES[typeCode];
  const shareText = `测测你是白茶女孩还是海妖女孩？→ LBTI 爱与生活能量测试\n我的类型：${typeCode} ${type.name} ${type.emoji}\n${type.tagline}`;

  if (navigator.share) {
    navigator.share({ title: 'LBTI 爱与生活能量测试', text: shareText }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareText).then(() => {
      alert('结果已复制到剪贴板，粘贴分享给你的朋友吧～');
    }).catch(() => {
      prompt('复制这段文字分享给你的朋友：', shareText);
    });
  }
}

function resetQuiz() {
  currentQuestion = 0;
  answers = new Array(24).fill(null);
  selectedValue = null;
  showView('landing');
}

// ==================== INIT ====================
showView('landing');
