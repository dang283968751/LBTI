<style>
        body {
            background: radial-gradient(circle at top right, #f8c8dc 0%, #f7f9fb 50%, #cae6ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(121, 84, 101, 0.05);
        }

        .dimension-glow {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 15px rgba(121, 84, 101, 0.1);
        }

        .option-button.active {
            background: #795465;
            color: white !important;
            border-color: #795465;
        }

        .progress-container {
            height: 4px;
            background: rgba(121, 84, 101, 0.1);
        }

        .progress-bar {
            height: 100%;
            width: 4.16%; /* 1/24 */
            background: linear-gradient(90deg, #795465, #e9bacd);
            transition: width 0.5s ease;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="font-body-md text-on-surface">
<!-- Top Navigation Header -->
<header class="fixed top-0 w-full z-50 bg-white/60 backdrop-blur-xl border-b border-white/20 shadow-sm shadow-primary/5">
<div class="flex justify-between items-center px-gutter py-4 w-full max-w-container-max mx-auto">
<div class="font-headline-md text-headline-md tracking-tighter text-primary">LBTI</div>
<div class="flex items-center gap-4">
<span class="font-label-caps text-label-caps text-on-surface-variant">进度 1 / 24</span>
<span class="material-symbols-outlined text-primary cursor-pointer">account_circle</span>
</div>
</div>
<!-- Progress Bar Hook -->
<div class="progress-container w-full">
<div class="progress-bar"></div>
</div>
</header>
<main class="pt-[120px] pb-[160px] px-gutter max-w-container-max mx-auto min-h-screen flex flex-col justify-center">
<!-- Animated Background Ornament -->
<div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">

</div>
<div class="w-full max-w-2xl mx-auto space-y-stack-lg">
<!-- Question Content -->
<div class="glass-card p-stack-lg md:p-12 rounded-xl text-center dimension-glow">
<span class="font-label-caps text-label-caps text-primary/60 mb-stack-sm block tracking-widest uppercase">Dimension: Social Tempo</span>
<h1 class="font-headline-md text-headline-md md:text-[32px] text-on-surface leading-relaxed mb-12">
                    1. 第一次认识喜欢的人时，我通常不会立刻表现热情。
                </h1>
<!-- Scale Options -->
<div class="grid grid-cols-1 gap-4">
<button class="option-button glass-card flex items-center justify-between px-6 py-5 rounded-lg text-left group">
<span class="font-body-md text-on-surface-variant group-hover:text-primary">非常不像我</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 group-[.active]:opacity-100 transition-opacity"></div>
</div>
</button>
<button class="option-button glass-card flex items-center justify-between px-6 py-5 rounded-lg text-left group">
<span class="font-body-md text-on-surface-variant group-hover:text-primary">有点不像</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 group-[.active]:opacity-100 transition-opacity"></div>
</div>
</button>
<button class="option-button glass-card flex items-center justify-between px-6 py-5 rounded-lg text-left group active">
<span class="font-body-md text-white">一般</span>
<div class="w-6 h-6 rounded-full border-2 border-white flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-white opacity-100"></div>
</div>
</button>
<button class="option-button glass-card flex items-center justify-between px-6 py-5 rounded-lg text-left group">
<span class="font-body-md text-on-surface-variant group-hover:text-primary">比较像</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary opacity-0 group-[.active]:opacity-100 transition-opacity"></div>
</div>

<button class="option-button glass-card flex items-center justify-between px-6 py-5 rounded-lg text-left group">

<div class="w-3 h-3 rounded-full bg-primary opacity-0 group-[.active]:opacity-100 transition-opacity"></div>
</div>

</div>

</a>

<span class="material-symbols-outlined">self_care</span>

<script>
        // Interactive Scale Button Logic
        const buttons = document.querySelectorAll('.option-button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active state from all
                buttons.forEach(b => {
                    b.classList.remove('active', 'bg-[#795465]', 'text-white');
                    const text = b.querySelector('span');
                    text.className = 'font-body-md text-on-surface-variant group-hover:text-primary';
                    const circle = b.querySelector('.w-6');
                    circle.className = 'w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center';
                    const dot = b.querySelector('.w-3');
                    dot.className = 'w-3 h-3 rounded-full bg-primary opacity-0 group-[.active]:opacity-100 transition-opacity';
                });

                // Add active state to clicked
                btn.classList.add('active', 'bg-[#795465]');
                const activeText = btn.querySelector('span');
                activeText.className = 'font-body-md text-white';
                const activeCircle = btn.querySelector('.w-6');
                activeCircle.className = 'w-6 h-6 rounded-full border-2 border-white flex items-center justify-center';
                const activeDot = btn.querySelector('.w-3');
                activeDot.className = 'w-3 h-3 rounded-full bg-white opacity-100';
                
                // Dimming animation effect
                document.querySelector('.dimension-glow').style.boxShadow = '0 0 40px rgba(121, 84, 101, 0.15)';
                setTimeout(() => {
                    document.querySelector('.dimension-glow').style.boxShadow = '0 8px 32px 0 rgba(121, 84, 101, 0.05)';
                }, 400);
            });
        });

        // Micro-interaction for Progress Bar
        window.addEventListener('load', () => {
            const pb = document.querySelector('.progress-bar');
            pb.style.width = '0%';
            setTimeout(() => {
                pb.style.width = '4.16%';
            }, 300);
        });
    </script>
</body></html>
