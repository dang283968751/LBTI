<script>
        // Micro-interaction for the CTA button
        const ctaBtn = document.querySelector('.btn-gradient');
        ctaBtn.addEventListener('mousedown', () => {
            ctaBtn.style.transform = 'scale(0.98)';
        });
        ctaBtn.addEventListener('mouseup', () => {
            ctaBtn.style.transform = 'scale(1)';
        });

        // Background subtle parallax on scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const heroImage = document.querySelector('.floating');
            if (heroImage) {
                heroImage.style.transform = `translateY(${scrolled * 0.15}px)`;
            }
        });
