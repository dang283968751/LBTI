<script>
        // Micro-interactions for selection
        document.querySelectorAll('input[name="lbti_choice"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Potential logic for auto-advancing after a short delay
                console.log('Selected:', e.target.id);
            });
        });

        // Soft reveal animation on load
        window.addEventListener('DOMContentLoaded', () => {
            document.body.classList.add('opacity-0');
            setTimeout(() => {
                document.body.style.transition = 'opacity 1.2s ease-in-out';
                document.body.classList.remove('opacity-0');
